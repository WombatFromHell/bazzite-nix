name: Build Reusable
description: Build, rechunk, and extract digest for a single image variant

inputs:
  base_image:
    description: "Base image to build from"
    required: true
  build_script:
    description: "Build script to use"
    required: false
    default: "build.sh"
  canonical_tag:
    description: "Canonical tag for the image"
    required: true
  variant:
    description: "Variant name"
    required: true
  parent_version:
    description: "Parent image version for OCI labels"
    required: true
  date:
    description: "ISO 8601 timestamp"
    required: true
  image_desc:
    description: "Image description for OCI labels"
    required: true
  repository_owner:
    description: "GitHub repository owner"
    required: true
  repository_name:
    description: "GitHub repository name"
    required: true

outputs:
  source_ref:
    description: "Container storage ref for the final image"
    value: ${{ steps.final_ref.outputs.source_ref }}
  full_build_digest:
    description: "Full sha256 digest of the built image"
    value: ${{ steps.final_ref.outputs.full_build_digest }}
  build_digest:
    description: "Short digest (without sha256: prefix)"
    value: ${{ steps.final_ref.outputs.build_digest }}
  kernel_version:
    description: "Kernel version extracted from the built image"
    value: ${{ steps.labels.outputs.kernel_version }}

runs:
  using: composite
  steps:
    - name: Show disk space
      shell: bash
      run: sudo df -h

    - name: Check if /mnt is there
      id: check_mnt
      shell: bash
      run: |
        if sudo mountpoint /mnt; then
          echo "mnt_is_there=1" >> "$GITHUB_OUTPUT"
        else
          echo "mnt_is_there=0" >> "$GITHUB_OUTPUT"
        fi

    - name: Mount BTRFS for podman storage
      if: ${{ steps.check_mnt.outputs.mnt_is_there == '1' }}
      uses: ublue-os/container-storage-action@main
      with:
        target-dir: /var/lib/containers

    - name: Check available disk space on /
      id: check_space
      shell: bash
      run: |
        avail_gb=$(df -B1G / | awk 'NR==2 {print $4}')
        echo "avail_gb=${avail_gb}" >> "$GITHUB_OUTPUT"
        if [ "${avail_gb}" -lt 50 ]; then # <50GB Avail is "low"
          echo "low_space=1" >> "$GITHUB_OUTPUT"
        else
          echo "low_space=0" >> "$GITHUB_OUTPUT"
        fi

    - name: Free Disk Space (Ubuntu)
      if: ${{ steps.check_space.outputs.low_space == '1' }}
      uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1

    - name: Build image
      shell: bash
      run: |
        source "${{ github.action_path }}/helpers.sh"
        build_image \
          "${{ inputs.base_image }}" \
          "${{ inputs.build_script }}" \
          "${{ inputs.canonical_tag }}" \
          "${{ inputs.variant }}" \
          "./Containerfile"

    - name: Extract image info
      id: labels
      shell: bash
      run: |
        source "${{ github.action_path }}/helpers.sh"
        extract_image_info "${{ runner.temp }}/manifest.json" >> "$GITHUB_OUTPUT"
      # Outputs: kernel_version, manifest_packages

    - name: Assemble image labels
      id: assemble_labels
      shell: bash
      run: |
        source "${{ github.action_path }}/helpers.sh"
        assemble_labels \
          "${{ inputs.date }}" \
          "${{ inputs.image_desc }}" \
          "${{ inputs.variant }}" \
          "${{ inputs.parent_version }}" \
          "${{ inputs.repository_owner }}" \
          "${{ inputs.repository_name }}" \
          "${{ steps.labels.outputs.kernel_version }}" \
          "${{ runner.temp }}/manifest.json" \
          "${{ runner.temp }}/labels.txt"
        echo "labels_file=${{ runner.temp }}/labels.txt" >> "$GITHUB_OUTPUT"

    - name: Rechunk image
      shell: bash
      run: |
        source "${{ github.action_path }}/helpers.sh"
        rechunk_image "${{ steps.assemble_labels.outputs.labels_file }}"

    - name: Extract final image ref
      id: final_ref
      shell: bash
      run: |
        source "${{ github.action_path }}/helpers.sh"
        extract_final_ref >> "$GITHUB_OUTPUT"
