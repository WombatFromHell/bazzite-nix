name: Build Reusable
description: Build, rechunk, and extract digest for a single image variant

inputs:
  base_image:
    description: "Base image to build from"
    required: true
  build_script:
    description: "Build script to use"
    required: false
    default: "build.sh"
  canonical_tag:
    description: "Canonical tag for the image"
    required: true
  variant:
    description: "Variant name"
    required: true
  parent_version:
    description: "Parent image version for OCI labels"
    required: true
  date:
    description: "ISO 8601 timestamp"
    required: true
  image_desc:
    description: "Image description for OCI labels"
    required: true
  repository_owner:
    description: "GitHub repository owner"
    required: true
  repository_name:
    description: "GitHub repository name"
    required: true

outputs:
  source_ref:
    description: "Container storage ref for the final image"
    value: ${{ steps.final_ref.outputs.source_ref }}
  full_build_digest:
    description: "Full sha256 digest of the built image"
    value: ${{ steps.final_ref.outputs.full_build_digest }}
  build_digest:
    description: "Short digest (without sha256: prefix)"
    value: ${{ steps.final_ref.outputs.build_digest }}
  kernel_version:
    description: "Kernel version extracted from the built image"
    value: ${{ steps.labels.outputs.kernel_version }}

runs:
  using: composite
  steps:
    - name: Build image
      shell: bash
      run: |
        set -euo pipefail
        sudo podman build \
          --tag localhost/raw-img \
          --build-arg BASE_IMAGE="${{ inputs.base_image }}" \
          --build-arg BUILD_SCRIPT="${{ inputs.build_script }}" \
          --build-arg CANONICAL_TAG="${{ inputs.canonical_tag }}" \
          --build-arg VARIANT="${{ inputs.variant }}" \
          --file ./Containerfile .

    - name: Assemble image labels
      id: labels
      shell: bash
      run: |
        set -euo pipefail
        KERNEL_VERSION=$(sudo podman run --rm localhost/raw-img \
          cat /usr/share/ublue-os/kernel-version)
        echo "kernel_version=${KERNEL_VERSION}" >> "$GITHUB_OUTPUT"
        LABELS=(
          "org.opencontainers.image.created=${{ inputs.date }}"
          "org.opencontainers.image.description=${{ inputs.image_desc }}"
          "org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ inputs.repository_owner }}/${{ inputs.repository_name }}/refs/heads/main/README.md"
          "org.opencontainers.image.source=https://github.com/${{ inputs.repository_owner }}/${{ inputs.repository_name }}/blob/main/Containerfile"
          "org.opencontainers.image.title=${{ inputs.variant }}"
          "org.opencontainers.image.url=https://github.com/${{ inputs.repository_owner }}/${{ inputs.repository_name }}"
          "org.opencontainers.image.vendor=${{ inputs.repository_owner }}"
          "org.opencontainers.image.version=${{ inputs.parent_version }}"
          "org.opencontainers.image.kernel-version=${KERNEL_VERSION}"
          "containers.bootc=1"
        )
        printf '%s\n' "${LABELS[@]}" > "${RUNNER_TEMP}/labels.txt"
        echo "labels_file=${RUNNER_TEMP}/labels.txt" >> "$GITHUB_OUTPUT"

    - name: Rechunk image
      shell: bash
      run: |
        set -euo pipefail
        LABEL_ARGS=()
        while IFS= read -r line; do
          [ -n "$line" ] && LABEL_ARGS+=(--label "$line")
        done < "${{ steps.labels.outputs.labels_file }}"

        # Initialize OCI layout on host (shared into container via the volume)
        sudo mkdir -p /var/lib/containers/oci
        echo '{"imageLayoutVersion":"1.0.0"}' | sudo tee /var/lib/containers/oci/oci-layout > /dev/null
        echo '{"schemaVersion":2,"manifests":[]}' | sudo tee /var/lib/containers/oci/index.json > /dev/null

        sudo podman run --rm --privileged \
          --volume /var/lib/containers:/var/lib/containers \
          quay.io/centos-bootc/centos-bootc:stream10 \
          rpm-ostree compose build-chunked-oci \
          --bootc --max-layers 128 --format-version 2 \
          --from localhost/raw-img \
          --output oci:/var/lib/containers/oci:latest \
          "${LABEL_ARGS[@]}"

        sudo podman image exists localhost/raw-img && \
          sudo podman rmi localhost/raw-img

    - name: Extract final image ref
      id: final_ref
      shell: bash
      run: |
        set -euo pipefail
        SOURCE_REF="oci:/var/lib/containers/oci:latest"
        sudo skopeo inspect --raw "$SOURCE_REF" > /dev/null || \
          { echo "::error::Expected OCI layout ${SOURCE_REF} not found after rechunk"; exit 1; }
        FULL_DIGEST=$(sudo skopeo inspect --raw "$SOURCE_REF" | jq -r '.config.digest // empty')
        # Fall back to manifest digest if config digest unavailable
        if [ -z "$FULL_DIGEST" ]; then
          FULL_DIGEST=$(sudo sha256sum /var/lib/containers/oci/index.json | awk '{print "sha256:"$1}')
        fi
        SHORT_DIGEST="${FULL_DIGEST#sha256:}"
        echo "source_ref=$SOURCE_REF"         >> "$GITHUB_OUTPUT"
        echo "full_build_digest=$FULL_DIGEST" >> "$GITHUB_OUTPUT"
        echo "build_digest=$SHORT_DIGEST"     >> "$GITHUB_OUTPUT"
