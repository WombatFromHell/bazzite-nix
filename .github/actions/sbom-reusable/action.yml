name: SBOM Reusable
description: Extract embedded SBOM from container image and create signed attestation with SBOM

inputs:
  image_ref:
    description: "Container storage reference (e.g., ghcr.io/owner/image@sha256:...)"
    required: true
  variant_name:
    description: "Variant name for logging"
    required: true
  registry:
    description: "Registry URL (e.g., ghcr.io/owner)"
    required: true
  repo:
    description: "Repository name"
    required: true
  suffix:
    description: "Image name suffix (e.g., -nvidia)"
    required: false
    default: ""
  image_digest:
    description: "Published image digest (e.g., sha256:...)"
    required: true
  github_token:
    description: "GitHub token for OCI registry auth"
    required: true
  signing_secret:
    description: "Cosign private key for signing"
    required: true

outputs:
  sbom_path:
    description: "Path to extracted SBOM JSON file"
    value: ${{ steps.extract_sbom.outputs.sbom_path }}
  sbom_file_digest:
    description: "SHA256 digest of extracted SBOM file"
    value: ${{ steps.extract_sbom.outputs.sbom_file_digest }}

runs:
  using: composite
  steps:
    - name: Extract embedded SBOM
      id: extract_sbom
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        GITHUB_OUTPUT: ${{ github.output }}
      run: |
        set -euo pipefail
        source "${{ github.action_path }}/helpers.sh"

        extract_embedded_sbom "${IMAGE_REF}"

    - name: Authenticate to registry
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        mkdir -p ~/.docker
        AUTH_VALUE="$(printf '%s:%s' "${GITHUB_ACTOR:-ci}" "${GH_TOKEN}" | base64 -w0)"
        cat > ~/.docker/config.json <<EOF
        {
          "auths": {
            "${REGISTRY}": {
              "auth": "${AUTH_VALUE}"
            }
          }
        }
        EOF

    - name: Attest build provenance
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        subject-name: ${{ inputs.registry }}/${{ inputs.repo }}${{ inputs.suffix }}
        subject-digest: ${{ inputs.image_digest }}
        sbom-path: ${{ steps.extract_sbom.outputs.sbom_path }}
        push-to-registry: true
