name: SBOM Reusable
description: Extract embedded SBOM from container image and attach as signed OCI artifact

inputs:
  image_ref:
    description: "Container storage reference (e.g., ghcr.io/owner/image@sha256:...)"
    required: true
  variant_name:
    description: "Variant name for logging"
    required: true
  registry:
    description: "Registry URL (e.g., ghcr.io/owner)"
    required: true
  repo:
    description: "Repository name"
    required: true
  suffix:
    description: "Image name suffix (e.g., -nvidia)"
    required: false
    default: ""
  image_digest:
    description: "Published image digest (e.g., sha256:...)"
    required: true
  github_token:
    description: "GitHub token for OCI registry auth"
    required: true
  signing_secret:
    description: "Cosign private key for signing"
    required: true

outputs:
  sbom_path:
    description: "Path to extracted SBOM JSON file"
    value: ${{ steps.extract_sbom.outputs.sbom_path }}
  sbom_file_digest:
    description: "SHA256 digest of extracted SBOM file"
    value: ${{ steps.extract_sbom.outputs.sbom_file_digest }}
  sbom_remote_digest:
    description: "Digest of the attached SBOM artifact"
    value: ${{ steps.attach_sbom.outputs.sbom_remote_digest }}
  signed:
    description: "Whether the SBOM was signed"
    value: ${{ steps.sign_sbom.outputs.signed }}

runs:
  using: composite
  steps:
    - name: Extract embedded SBOM
      id: extract_sbom
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.image_ref }}
        GITHUB_OUTPUT: ${{ github.output }}
      run: |
        set -euo pipefail
        source "${{ github.action_path }}/helpers.sh"

        extract_embedded_sbom "${IMAGE_REF}"

    - name: Authenticate to registry
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        mkdir -p ~/.docker
        AUTH_VALUE="$(printf '%s:%s' "${GITHUB_ACTOR:-ci}" "${GH_TOKEN}" | base64 -w0)"
        cat > ~/.docker/config.json <<EOF
        {
          "auths": {
            "${REGISTRY}": {
              "auth": "${AUTH_VALUE}"
            }
          }
        }
        EOF

    - name: Attach SBOM to OCI registry
      id: attach_sbom
      shell: bash
      env:
        IMAGE: ${{ inputs.registry }}/${{ inputs.repo }}${{ inputs.suffix }}
        DIGEST: ${{ inputs.image_digest }}
        SBOM_PATH: ${{ steps.extract_sbom.outputs.sbom_path }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_OUTPUT: ${{ github.output }}
      run: |
        set -euo pipefail
        source "${{ github.action_path }}/helpers.sh"

        attach_sbom_to_oci \
          "${SBOM_PATH}" \
          "${IMAGE}" \
          "${DIGEST}" \
          ~/.docker/config.json

    - name: Sign SBOM artifact
      id: sign_sbom
      shell: bash
      env:
        IMAGE: ${{ inputs.registry }}/${{ inputs.repo }}${{ inputs.suffix }}
        SBOM_DIGEST: ${{ steps.attach_sbom.outputs.sbom_remote_digest }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_OUTPUT: ${{ github.output }}
        COSIGN_PRIVATE_KEY: ${{ inputs.signing_secret }}
      run: |
        set -euo pipefail
        source "${{ github.action_path }}/helpers.sh"

        sign_sbom_artifact \
          "${COSIGN_PRIVATE_KEY}" \
          "${IMAGE}" \
          "${SBOM_DIGEST}" \
          "${GITHUB_ACTOR}" \
          "${GITHUB_TOKEN}"
