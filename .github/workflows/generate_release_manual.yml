name: Generate Release (Manual)

on:
  workflow_dispatch:
    inputs:
      variants:
        description: "Comma-delimited list of variants to generate releases for (blank = all enabled)"
        type: string
        required: false
        default: ""
      handwritten:
        description: "Optional changelog note to prepend"
        type: string
        required: false

jobs:
  resolve-variants:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve variants to process
        id: resolve
        run: |
          set -euo pipefail
          INPUT="${{ inputs.variants }}"

          if [ -z "$INPUT" ]; then
            # Blank input: get all enabled variants from variants.json
            ENABLED=$(jq -r '.variants[] | select(.disabled != true) | .name' .github/variants.json | paste -sd ',' -)
            echo "ℹ️ No variants specified — processing all enabled: $ENABLED"
          else
            # Parse and validate comma-delimited input
            ENABLED=""
            IFS=',' read -ra VARIANTS <<< "$INPUT"
            for v in "${VARIANTS[@]}"; do
              # ✅ Trim whitespace using parameter expansion (shellcheck SC2001 fix)
              v="${v#"${v%%[![:space:]]*}"}"  # trim leading
              v="${v%"${v##*[![:space:]]}"}"  # trim trailing
              [ -z "$v" ] && continue
              
              # Check if variant exists
              FOUND=$(jq -r --arg v "$v" '.variants[] | select(.name == $v) | .name' .github/variants.json)
              if [ -z "$FOUND" ]; then
                echo "::warning::Variant '$v' not found in variants.json, skipping"
                continue
              fi
              
              # Check if variant is disabled
              DISABLED=$(jq -r --arg v "$v" '.variants[] | select(.name == $v) | .disabled // false' .github/variants.json)
              if [ "$DISABLED" = "true" ]; then
                echo "::warning::Variant '$v' is disabled in variants.json, skipping"
                continue
              fi
              
              ENABLED="${ENABLED}${v},"
            done
            # ✅ Remove trailing comma using parameter expansion (shellcheck SC2001 fix)
            ENABLED="${ENABLED%,}"
            echo "ℹ️ Processing requested variants: $ENABLED"
          fi

          if [ -z "$ENABLED" ]; then
            echo "::error::No valid enabled variants to process. Check your input or variants.json configuration."
            exit 1
          fi

          # Build JSON array properly for GITHUB_OUTPUT
          MATRIX_JSON=$(echo "$ENABLED" | tr ',' '\n' | while read -r v; do
            # Trim whitespace using parameter expansion
            v="${v#"${v%%[![:space:]]*}"}"
            v="${v%"${v##*[![:space:]]}"}"
            [ -n "$v" ] && echo "$v"
          done | jq -R . | jq -sc .)

          # Use heredoc syntax for safe GITHUB_OUTPUT writing
          {
            echo "matrix<<EOF"
            echo "$MATRIX_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Resolved matrix: $MATRIX_JSON"

  generate-release:
    needs: resolve-variants
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: ${{ fromJSON(needs.resolve-variants.outputs.matrix) }}
      fail-fast: false
    concurrency:
      group: generate-release-${{ matrix.variant }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    env:
      IMAGE_PREFIX: "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}"
      GITHUB_REPOSITORY: "${{ github.repository }}"
      GITHUB_REPOSITORY_OWNER: "${{ github.repository_owner }}"
      VARIANT: "${{ matrix.variant }}"
    steps:
      - name: Checkout last 500 commits (for changelog generation)
        uses: actions/checkout@v6
        with:
          fetch-depth: 500

      - name: Generate Release Text
        id: generate-release
        run: |
          python3 .github/workflows/changelog.py \
            "${{ env.VARIANT }}" \
            ./output.env \
            ./changelog.md \
            --workdir . \
            --handwritten "${{ inputs.handwritten || '' }}" \
            --variants-config .github/variants.json

          source ./output.env
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.generate-release.outputs.title }}
          tag_name: ${{ steps.generate-release.outputs.tag }}
          body_path: ./changelog.md
          make_latest: ${{ matrix.variant == 'stable' }}
          prerelease: ${{ matrix.variant != 'stable' }}
          generate_release_notes: false
