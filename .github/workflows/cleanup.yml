name: Clean Old Images

on:
  schedule:
    - cron: "1 7 * * 0" # 07:01 UTC every Sunday
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry-run mode"
        type: boolean
        default: true
      package-filter:
        description: "Comma-separated list of full package names to process (empty = all cleanup-enabled)"
        type: string
        default: ""

env:
  # Scheduled runs are always live; manual runs respect the input (default: true = safe).
  DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry-run == true && 'true' || 'false' }}

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      packages: ${{ steps.variants.outputs.packages }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build package matrix
        id: variants
        run: |
          set -euo pipefail

          FILTER="${{ inputs.package-filter }}"
          VARIANTS_FILE=".github/variants.json"
          BASE="bazzite-nix"

          # Build the full list of unique package names from variants that have
          # cleanup: true and are not disabled (unless a package-filter overrides).
          #
          # The cleanup property opts a variant into scheduled/automated cleanup.
          # Variants without it (or with cleanup: false) are skipped in normal runs.
          # A package-filter override bypasses the cleanup flag so a specific package
          # can be run manually even if cleanup is not set.
          #
          # unique deduplicates so tag-only variants sharing the same package name
          # (e.g. bazzite-nix:stable and bazzite-nix:testing) produce one matrix entry.

          if [ -n "$FILTER" ]; then
            # Override mode: include all variants (disabled or not) then filter.
            jq -r --arg base "$BASE" \
              '[.variants[] | ($base + (.suffix // "")) | ascii_downcase] | unique[]' \
              "$VARIANTS_FILE" > /tmp/all_packages.txt

            # -x: whole-line match prevents 'bazzite-nix' matching 'bazzite-nix-cachyos'
            grep -Fxf <(echo "$FILTER" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//') \
              /tmp/all_packages.txt > /tmp/packages.txt 2>/dev/null || touch /tmp/packages.txt

            if [ ! -s /tmp/packages.txt ]; then
              echo "::warning::package-filter '${FILTER}' matched no defined packages — check your package names"
            fi
          else
            # Normal mode: respect disabled flag and require cleanup: true.
            jq -r --arg base "$BASE" \
              '[.variants[] | select(.disabled != true) | select(.cleanup != false) | ($base + (.suffix // "")) | ascii_downcase] | unique[]' \
              "$VARIANTS_FILE" > /tmp/packages.txt
          fi

          echo "Packages to process:"
          cat /tmp/packages.txt

          packages=$(jq -Rnc '[inputs]' < /tmp/packages.txt)
          echo "packages=${packages}" >> "$GITHUB_OUTPUT"

  cleanup:
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.packages) }}

    # Prevent parallel runs against the same package (recommended by action docs).
    concurrency:
      group: cleanup-${{ matrix.package }}
      cancel-in-progress: false

    permissions:
      packages: write

    steps:
      - name: Normalize registry owner to lowercase
        # OCI image refs must be fully lowercase per the OCI distribution spec.
        run: |
          lc_owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY_OWNER_LC=${lc_owner}" >> "$GITHUB_ENV"
          echo "IMAGE_BASE=ghcr.io/${lc_owner}/${{ matrix.package }}" >> "$GITHUB_ENV"

      - name: Cleanup images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          package: ${{ matrix.package }}
          older-than: 60 days # primary filter
          keep-n-tagged: 24 # secondary filter (fallback)
          delete-untagged: true
          delete-partial-images: true
          delete-orphaned-images: true
          dry-run: ${{ env.DRY_RUN }}
          log-level: info
