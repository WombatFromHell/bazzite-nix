name: Generate Release (Manual)

on:
  workflow_dispatch:
    inputs:
      variants:
        description: "Comma-delimited list of variants to generate releases for (blank = all enabled)"
        type: string
        required: false
        default: ""
      handwritten:
        description: "Optional changelog note to prepend"
        type: string
        required: false
        default: ""

jobs:
  resolve-variants:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve variants
        id: resolve
        run: |
          set -euo pipefail
          INPUT="${{ inputs.variants }}"

          if [ -z "$INPUT" ]; then
            # Blank input: get all enabled variants from variants.json
            ENABLED=$(jq -r '.variants[] | select(.disabled != true) | .name' .github/variants.json | paste -sd ',' -)
          else
            # Parse comma-delimited input
            ENABLED=""
            IFS=',' read -ra VARIANTS <<< "$INPUT"
            for v in "${VARIANTS[@]}"; do
              v="${v#"${v%%[![:space:]]*}"}"
              v="${v%"${v##*[![:space:]]}"}"
              [ -z "$v" ] && continue
              ENABLED="${ENABLED}${v},"
            done
            ENABLED="${ENABLED%,}"
          fi

          if [ -z "$ENABLED" ]; then
            echo "::error::No valid variants to process"
            exit 1
          fi

          # Build JSON array for matrix
          MATRIX_JSON=$(echo "$ENABLED" | tr ',' '\n' | while read -r v; do
            v="${v#"${v%%[![:space:]]*}"}"
            v="${v%"${v##*[![:space:]]}"}"
            [ -n "$v" ] && echo "$v"
          done | jq -R . | jq -sc .)

          {
            echo "matrix<<EOF"
            echo "$MATRIX_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Resolved variants: $MATRIX_JSON"

  generate-release:
    needs: resolve-variants
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant: ${{ fromJSON(needs.resolve-variants.outputs.matrix) }}
      fail-fast: false
    concurrency:
      group: generate-release-${{ matrix.variant }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout last 500 commits
        uses: actions/checkout@v6
        with:
          fetch-depth: 500

      - name: Generate release
        uses: ./.github/actions/release-reusable
        with:
          variant: ${{ matrix.variant }}
          handwritten: ${{ inputs.handwritten }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
