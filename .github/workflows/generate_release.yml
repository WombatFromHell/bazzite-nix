name: Generate Release

on:
  workflow_call:
    inputs:
      variant:
        description: "Variant name to generate release for (e.g., testing, unstable)"
        type: string
        required: true
      handwritten:
        description: "Small changelog about changes in this build"
        type: string
        required: false
      registry:
        description: "Container registry (e.g., ghcr.io/owner)"
        type: string
        required: false
        default: "ghcr.io/${{ github.repository_owner }}"
      repo:
        description: "Repository name"
        type: string
        required: false
        # Full image prefix will be: {registry}/{repo} (e.g., ghcr.io/owner/bazzite-nix)
        default: "${{ github.repository }}"
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant name to generate release for (e.g., testing, unstable)"
        type: string
        required: true
      handwritten:
        description: "Small changelog about changes in this build"
        type: string
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout last 500 commits (for changelog generation)
        uses: actions/checkout@v6
        with:
          fetch-depth: 500

      - name: Get target
        id: get-target
        run: |
          # Use variant input directly as the target
          TARGET="${{ inputs.variant }}"
          TARGET="${TARGET##*/}"
          if [ "$TARGET" = "main" ]; then
            TARGET="stable"
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Using target: $TARGET"

      - name: Generate Release Text
        id: generate-release
        env:
          IMAGE_PREFIX: "${{ inputs.registry }}/${{ inputs.repo }}"
          GITHUB_REPOSITORY: "${{ github.repository }}"
          GITHUB_REPOSITORY_OWNER: "${{ github.repository_owner }}"
        run: |
          python3 .github/workflows/changelog.py \
            "${{ steps.get-target.outputs.target }}" \
            ./output.env \
            ./changelog.md \
            --workdir . \
            --handwritten "${{ inputs.handwritten || '' }}" \
            --variants-config .github/variants.json

          source ./output.env
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.generate-release.outputs.title }}
          tag_name: ${{ steps.generate-release.outputs.tag }}
          body_path: ./changelog.md
          make_latest: ${{ steps.get-target.outputs.target == 'stable' }}
          prerelease: ${{ steps.get-target.outputs.target != 'stable' }}
          generate_release_notes: false
