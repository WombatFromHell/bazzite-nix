name: Generate Release

on:
  workflow_call:
    inputs:
      handwritten:
        description: "Small changelog about changes in this build"
        type: string
        required: false
      target:
        description: "Release Branch (e.g., testing, unstable). Defaults to branch name."
        type: string
        required: false
        default: ""
  workflow_dispatch:
    inputs:
      handwritten:
        description: "Small changelog about changes in this build"
        type: string
        required: false
      target:
        description: "Release Branch (e.g., testing, unstable). Defaults to branch name."
        type: string
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout last 500 commits (for changelog generation)
        uses: actions/checkout@v6
        with:
          fetch-depth: 500

      - name: Get target
        id: get-target
        run: |
          TARGET="${{ github.event.inputs.target || github.ref_name }}"
          TARGET="${TARGET##*/}"
          if [ "$TARGET" = "main" ]; then
            TARGET="stable"
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Using target: $TARGET"

      - name: Generate Release Text
        id: generate-release
        env:
          REGISTRY: "ghcr.io/${{ github.repository_owner }}"
          REPO: ${{ github.event.repository.name }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python3 .github/workflows/changelog.py \
            "${{ steps.get-target.outputs.target }}" \
            ./output.env \
            ./changelog.md \
            --workdir . \
            --handwritten "${{ inputs.handwritten || '' }}" \
            --variants-config .github/variants.json

          source ./output.env
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.generate-release.outputs.title }}
          tag_name: ${{ steps.generate-release.outputs.tag }}
          body_path: ./changelog.md
          make_latest: ${{ steps.get-target.outputs.target == 'stable' }}
          prerelease: ${{ steps.get-target.outputs.target != 'stable' }}
          generate_release_notes: false
