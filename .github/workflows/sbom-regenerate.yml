name: Regenerate SBOM (Manual)

on:
  workflow_dispatch:
    inputs:
      variants:
        description: "Comma-delimited list of variants to regenerate SBOM for (blank = all enabled)"
        type: string
        required: false
        default: ""

jobs:
  resolve-variants:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve variants
        id: resolve
        run: |
          set -euo pipefail
          INPUT="${{ inputs.variants }}"

          if [ -z "$INPUT" ]; then
            ENABLED=$(jq -r '.variants[] | select(.disabled != true) | .name' .github/variants.json | paste -sd ',' -)
          else
            ENABLED=""
            IFS=',' read -ra VARIANTS <<< "$INPUT"
            for v in "${VARIANTS[@]}"; do
              v="${v#"${v%%[![:space:]]*}"}"
              v="${v%"${v##*[![:space:]]}"}"
              [ -z "$v" ] && continue
              ENABLED="${ENABLED}${v},"
            done
            ENABLED="${ENABLED%,}"
          fi

          if [ -z "$ENABLED" ]; then
            echo "::error::No valid variants to process"
            exit 1
          fi

          MATRIX_JSON=$(echo "$ENABLED" | tr ',' '\n' | while read -r v; do
            v="${v#"${v%%[![:space:]]*}"}"
            v="${v%"${v##*[![:space:]]}"}"
            [ -n "$v" ] && echo "$v"
          done | jq -R . | jq -sc .)

          {
            echo "matrix<<EOF"
            echo "$MATRIX_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved variants: $MATRIX_JSON"

  get-latest-release:
    needs: resolve-variants
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
      has_entries: ${{ steps.build_matrix.outputs.has_entries }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install crane
        uses: imjasonh/setup-crane@v0.5

      - name: Get latest image tag from GHCR for each variant
        id: build_matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REGISTRY: "ghcr.io"
          OUTPUT_REPO_BASE: "ghcr.io/${{ github.repository_owner }}"
          REPO_NAME: "${{ github.event.repository.name }}"
        run: |
          set -euo pipefail

          source ./.github/actions/sbom-reusable/helpers.sh

          mkdir -p ~/.docker
          AUTH_VALUE="$(printf '%s:%s' "${GITHUB_ACTOR}" "${GH_TOKEN}" | base64 -w0)"
          cat > ~/.docker/config.json <<EOF
          {
            "auths": {
              "${REGISTRY}": {
                "auth": "${AUTH_VALUE}"
              }
            }
          }
          EOF

          echo "::group::Debug: Registry access test"
          crane auth login "${REGISTRY}" -u "${GITHUB_ACTOR}" -p "${GH_TOKEN}" 2>&1 || true
          echo "::endgroup::"

          VARIANTS='${{ needs.resolve-variants.outputs.matrix }}'

          build_matrix "$VARIANTS" "${OUTPUT_REPO_BASE}" "${REPO_NAME}"

  regenerate-sbom:
    needs: get-latest-release
    if: needs.get-latest-release.outputs.has_entries == 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant_data: ${{ fromJson(needs.get-latest-release.outputs.matrix) }}
      fail-fast: false

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      IMAGE_NAME: "bazzite-nix"
      REGISTRY: "ghcr.io/${{ github.repository_owner }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize registry to lowercase
        id: normalize_registry
        run: |
          REGISTRY_LOWER="ghcr.io/${{ github.repository_owner }}"
          REGISTRY_LOWER="${REGISTRY_LOWER,,}"
          echo "registry=${REGISTRY_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Pull image locally
        shell: bash
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_REPO: "${{ steps.normalize_registry.outputs.registry }}/${{ env.IMAGE_NAME }}${{ matrix.variant_data.suffix }}"
          IMAGE_TAG: ${{ matrix.variant_data.image_tag }}
          IMAGE_DIGEST: ${{ matrix.variant_data.image_digest }}
        run: |
          # Auth for podman
          printf '%s' "${GH_TOKEN}" | sudo podman login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

          sudo podman pull "${IMAGE_REPO}@${IMAGE_DIGEST}"
          sudo podman tag "${IMAGE_REPO}@${IMAGE_DIGEST}" "${IMAGE_REPO}:${IMAGE_TAG}"

      - name: Generate and attach SBOM
        id: manage_sbom
        uses: ./.github/actions/sbom-reusable
        with:
          image_ref: "${{ steps.normalize_registry.outputs.registry }}/${{ env.IMAGE_NAME }}${{ matrix.variant_data.suffix }}@${{ matrix.variant_data.image_digest }}"
          variant_name: ${{ matrix.variant_data.variant }}
          version_tag: ${{ matrix.variant_data.canonical_tag }}
          registry: ${{ steps.normalize_registry.outputs.registry }}
          repo: ${{ env.IMAGE_NAME }}
          suffix: ${{ matrix.variant_data.suffix }}
          image_digest: ${{ matrix.variant_data.image_digest }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_actor: ${{ github.actor }}
          signing_secret: ${{ secrets.SIGNING_SECRET }}
