name: Build Custom Image

on:
  schedule:
    - cron: "1 6 * * 1" # 06:01 UTC (Mon,Fri)
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if digest unchanged"
        required: false
        default: false
        type: boolean
      generate_release:
        description: "Generate GitHub release after build"
        required: false
        default: false
        type: boolean
      handwritten:
        description: "Small changelog about changes in this build"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_DESC: "Customized Bazzite image with Nix mount support and other sugar"
  VARIANTS_CONFIG: ".github/variants.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_and_aggregate:
    runs-on: ubuntu-24.04
    outputs:
      variants_to_build: ${{ steps.check.outputs.variants_to_build }}
      any_builds_needed: ${{ steps.check.outputs.any_builds_needed }}
      date: ${{ steps.date.outputs.date }}
      registry: ${{ steps.lowercase_owner.outputs.registry }}
      repo: ${{ env.IMAGE_NAME }}
      image_desc: ${{ env.IMAGE_DESC }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lowercase repository owner
        id: lowercase_owner
        run: |
          echo "registry=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set build date
        id: date
        run: |
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Check variants
        id: check
        uses: ./.github/actions/check-variants
        with:
          force_build: ${{ github.event.inputs.force_build == 'true' }}
          variants_config: ".github/variants.json"
          registry: ${{ steps.lowercase_owner.outputs.registry }}
          repo: ${{ env.IMAGE_NAME }}
          image_desc: ${{ env.IMAGE_DESC }}
          date: ${{ steps.date.outputs.date }}

  build_push:
    needs: check_and_aggregate
    if: needs.check_and_aggregate.outputs.any_builds_needed == 'true'
    name: Build & Push ${{ matrix.variant_data.variant }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant_data: ${{ fromJson(needs.check_and_aggregate.outputs.variants_to_build) }}

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    env:
      BASE_IMG: >-
        ${{ needs.check_and_aggregate.outputs.registry }}/${{ needs.check_and_aggregate.outputs.repo }}${{ matrix.variant_data.suffix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build image
        uses: ./.github/actions/build-reusable
        id: build
        with:
          base_image: ${{ matrix.variant_data.base_image }}
          build_script: ${{ matrix.variant_data.build_script || 'build.sh' }}
          canonical_tag: ${{ matrix.variant_data.canonical_tag }}
          variant: ${{ matrix.variant_data.variant }}
          parent_version: ${{ matrix.variant_data.parent_version }}
          date: ${{ needs.check_and_aggregate.outputs.date }}
          image_desc: ${{ needs.check_and_aggregate.outputs.image_desc }}
          repository_owner: ${{ github.repository_owner }}
          repository_name: ${{ github.event.repository.name }}

      - name: Push, sign, and verify image
        id: push_image
        uses: ./.github/actions/push-reusable
        with:
          source_ref: ${{ steps.build.outputs.source_ref }}
          variant_name: ${{ matrix.variant_data.variant }}
          tags: ${{ matrix.variant_data.tags }}
          signing_secret: ${{ secrets.SIGNING_SECRET }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_actor: ${{ github.actor }}
          registry: ${{ needs.check_and_aggregate.outputs.registry }}
          repo: ${{ needs.check_and_aggregate.outputs.repo }}
          suffix: ${{ matrix.variant_data.suffix }}
          date: ${{ needs.check_and_aggregate.outputs.date }}
          parent_version: ${{ matrix.variant_data.parent_version }}

      - name: Generate SBOM (attach & sign)
        id: manage_sbom
        uses: ./.github/actions/sbom-reusable
        with:
          image_ref: ${{ steps.build.outputs.source_ref }}
          variant_name: ${{ matrix.variant_data.variant }}
          version_tag: ${{ steps.build.outputs.variant_tag }}
          registry: ${{ needs.check_and_aggregate.outputs.registry }}
          repo: ${{ needs.check_and_aggregate.outputs.repo }}
          suffix: ${{ matrix.variant_data.suffix }}
          image_digest: ${{ steps.push_image.outputs.remote_digest }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_actor: ${{ github.actor }}
          signing_secret: ${{ secrets.SIGNING_SECRET }}

  collect_build_results:
    needs: [check_and_aggregate, build_push]
    if: needs.check_and_aggregate.outputs.any_builds_needed == 'true'
    runs-on: ubuntu-24.04
    outputs:
      successful_variants: ${{ steps.collect.outputs.successful_variants }}
      any_successful: ${{ steps.collect.outputs.any_successful }}
    steps:
      - name: Collect successful builds
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUCCESSFUL_VARIANTS="[]"

          JOBS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100")

          SUCCESSFUL_VARIANTS=$(echo "$JOBS" | jq -c '
            [ .jobs[]
            | select(.name | startswith("Build & Push"))
            | select(.conclusion == "success")
            | {variant: (.name | sub("^Build & Push "; ""))}
            ]')

          COUNT=$(echo "$SUCCESSFUL_VARIANTS" | jq 'length')
          ANY_SUCCESSFUL="false"
          if [[ "$COUNT" -gt 0 ]]; then
            ANY_SUCCESSFUL="true"
          fi

          echo "successful_variants=${SUCCESSFUL_VARIANTS}" >> "$GITHUB_OUTPUT"
          echo "any_successful=${ANY_SUCCESSFUL}" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT successful builds"

  generate_release:
    needs: [check_and_aggregate, build_push, collect_build_results]
    if: |
      needs.collect_build_results.outputs.any_successful == 'true' &&
      (github.event.inputs.generate_release == 'true' || github.event_name == 'schedule')
    name: Generate Release ${{ matrix.variant.variant }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    concurrency:
      group: generate-release-${{ matrix.variant.variant }}-${{ github.ref }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.collect_build_results.outputs.successful_variants) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate release
        id: release
        uses: ./.github/actions/release-reusable
        with:
          variant: ${{ matrix.variant.variant }}
          handwritten: ${{ github.event.inputs.handwritten || '' }}
          registry: ${{ needs.check_and_aggregate.outputs.registry }}
          repo: ${{ needs.check_and_aggregate.outputs.repo }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
