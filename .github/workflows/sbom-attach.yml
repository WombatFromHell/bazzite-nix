name: Attach SBOM (Manual)

on:
  workflow_dispatch:
    inputs:
      variants:
        description: "Comma-delimited list of variants to attach SBOM for (blank = all enabled)"
        type: string
        required: false
        default: ""

jobs:
  resolve-variants:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      registry: ${{ steps.ghcr.outputs.registry }}
      repo: ${{ steps.ghcr.outputs.repo }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase GHCR refs
        id: ghcr
        uses: ./.github/actions/ghcr-lc

      - name: Resolve variants
        id: resolve
        run: |
          set -euo pipefail
          INPUT="${{ inputs.variants }}"

          if [ -z "$INPUT" ]; then
            ENABLED=$(jq -r '.variants[] | select(.disabled != true) | .name' .github/variants.json | paste -sd ',' -)
          else
            ENABLED=""
            IFS=',' read -ra VARIANTS <<< "$INPUT"
            for v in "${VARIANTS[@]}"; do
              v="${v#"${v%%[![:space:]]*}"}"
              v="${v%"${v##*[![:space:]]}"}"
              [ -z "$v" ] && continue
              ENABLED="${ENABLED}${v},"
            done
            ENABLED="${ENABLED%,}"
          fi

          if [ -z "$ENABLED" ]; then
            echo "::error::No valid variants to process"
            exit 1
          fi

          MATRIX_JSON=$(echo "$ENABLED" | tr ',' '\n' | while read -r v; do
            v="${v#"${v%%[![:space:]]*}"}"
            v="${v%"${v##*[![:space:]]}"}"
            [ -n "$v" ] && echo "$v"
          done | jq -R . | jq -sc .)

          {
            echo "matrix<<EOF"
            echo "$MATRIX_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  get-latest-release:
    needs: resolve-variants
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}
      has_entries: ${{ steps.build_matrix.outputs.has_entries }}
      registry: ${{ needs.resolve-variants.outputs.registry }}
      repo: ${{ needs.resolve-variants.outputs.repo }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install crane
        uses: imjasonh/setup-crane@v0.5

      - name: Get latest image digests from GHCR
        id: build_matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REGISTRY: ${{ needs.resolve-variants.outputs.registry }}
          REPO_NAME: ${{ needs.resolve-variants.outputs.repo }}
        run: |
          set -euo pipefail

          source ./.github/actions/sbom-reusable/helpers.sh

          VARIANTS='${{ needs.resolve-variants.outputs.matrix }}'

          build_matrix "$VARIANTS" "${REGISTRY}" "${REPO_NAME}"

  attach-sbom:
    needs: get-latest-release
    if: needs.get-latest-release.outputs.has_entries == 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        variant_data: ${{ fromJson(needs.get-latest-release.outputs.matrix) }}
      fail-fast: false

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    env:
      REGISTRY: ${{ needs.get-latest-release.outputs.registry }}
      REPO: ${{ needs.get-latest-release.outputs.repo }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install crane
        uses: imjasonh/setup-crane@v0.5

      - name: Install oras
        uses: oras-project/setup-oras@v2

      - name: Check existing attestation
        id: check_attestation
        run: |
          set -euo pipefail
          source ./.github/actions/sbom-reusable/helpers.sh

          IMAGE_REF="${{ env.REGISTRY }}/${{ env.REPO }}${{ matrix.variant_data.suffix }}@${{ matrix.variant_data.image_digest }}"

          if check_attestation "$IMAGE_REF"; then
            echo "Attestation and SBOM already exist, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract and attach SBOM
        id: manage_sbom
        if: steps.check_attestation.outputs.skip != 'true'
        uses: ./.github/actions/sbom-reusable
        with:
          image_ref: "${{ env.REGISTRY }}/${{ env.REPO }}${{ matrix.variant_data.suffix }}@${{ matrix.variant_data.image_digest }}"
          variant_name: ${{ matrix.variant_data.variant }}
          registry: ${{ env.REGISTRY }}
          repo: ${{ env.REPO }}
          suffix: ${{ matrix.variant_data.suffix }}
          image_digest: ${{ matrix.variant_data.image_digest }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          signing_secret: ${{ secrets.SIGNING_SECRET }}
