on:
  workflow_call:
    inputs:
      variants_to_build:
        description: "JSON array of variant data to build"
        required: true
        type: string
      date:
        description: "ISO 8601 timestamp"
        required: true
        type: string
      registry_lower:
        description: "Registry URL (standardized output from build.yml)"
        required: true
        type: string
      repo:
        description: "Repository name (standardized output from build.yml)"
        required: true
        type: string
      image_desc:
        description: "Image description for OCI labels"
        required: true
        type: string
      skip_rechunk:
        description: "Skip rechunk step (faster build, larger layers)"
        required: false
        default: false
        type: boolean
    secrets:
      signing_secret:
        description: "Cosign signing secret"
        required: true

jobs:
  build_push:
    name: Build ${{ matrix.variant_data.variant }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant_data: ${{ fromJson(inputs.variants_to_build) }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Login for Skopeo (for push operations)
        id: skopeo_login
        run: |
          set -euo pipefail
          skopeo_login() {
            mkdir -p /tmp/skopeo-auth
            echo "${{ secrets.GITHUB_TOKEN }}" | \
            skopeo login ghcr.io -u ${{ github.actor }} \
              --password-stdin \
              --authfile /tmp/skopeo-auth/auth.json
          }
          max_attempts=3
          delay=15
          for attempt in $(seq 1 $max_attempts); do
            if skopeo_login; then
              break
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::All ${max_attempts} attempts failed."
              exit 1
            fi
            echo "::warning::Attempt ${attempt} failed. Retrying in ${delay}s..."
            sleep "$delay"
          done

      - name: Build image
        id: build_image
        run: |
          set -euo pipefail
          SKOPEO_TAG="localhost/raw-img"
          sudo podman build \
              --tag "${SKOPEO_TAG}" \
              --build-arg BASE_IMAGE="${{ matrix.variant_data.base_image }}" \
              --build-arg BUILD_SCRIPT="${{ matrix.variant_data.build_script || 'build.sh' }}" \
              --build-arg CANONICAL_TAG="${{ matrix.variant_data.canonical_tag }}" \
              --build-arg VARIANT="${{ matrix.variant_data.variant }}" \
              --file ./Containerfile . && \
              echo "skopeo_ref=containers-storage:${SKOPEO_TAG}" >> $GITHUB_OUTPUT

      - name: Assemble image labels
        id: labels
        run: |
          set -euo pipefail
          # Extract kernel version from the built image
          KERNEL_VERSION=$(sudo podman run --rm localhost/raw-img cat /usr/share/ublue-os/kernel-version)
          LABELS=$(cat <<EOF
          org.opencontainers.image.created=${{ inputs.date }}
          org.opencontainers.image.description=${{ inputs.image_desc }}
          org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/refs/heads/main/README.md
          org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/blob/main/Containerfile
          org.opencontainers.image.title=${{ matrix.variant_data.variant }}
          org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}
          org.opencontainers.image.vendor=${{ github.repository_owner }}
          org.opencontainers.image.version=${{ matrix.variant_data.parent_version }}
          org.opencontainers.image.kernel-version=${KERNEL_VERSION}
          containers.bootc=1
          EOF
          )
          LABELS=$(echo "$LABELS" | sed 's/^[[:space:]]*//')
          echo "labels<<EOF" >> $GITHUB_OUTPUT
          echo "$LABELS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Rechunker
        if: inputs.skip_rechunk != 'true'
        id: rechunk
        run: |
          LABEL_ARGS=()
          while IFS= read -r line; do
            [ -n "$line" ] && LABEL_ARGS+=(--label "$line")
          done <<< "${{ steps.labels.outputs.labels }}"

          # we normalize labels on our rechunked image directly in the rechunk step
          sudo podman run --rm --privileged \
              --volume /var/lib/containers:/var/lib/containers \
              quay.io/centos-bootc/centos-bootc:stream10 \
              rpm-ostree compose build-chunked-oci \
              --bootc --max-layers 67 --format-version 2 \
              --from localhost/raw-img \
              --output containers-storage:localhost/chunked-img \
              "${LABEL_ARGS[@]}"

          sudo podman image exists localhost/raw-img && \
            sudo podman rmi localhost/raw-img
          echo "ref=containers-storage:localhost/chunked-img" >> "$GITHUB_OUTPUT"

      - name: Normalize labels on raw image
        if: inputs.skip_rechunk == 'true'
        run: |
          set -euo pipefail
          container=$(sudo buildah from localhost/raw-img)
          sudo buildah config --label "-" "$container"
          while IFS= read -r line; do
            [ -n "$line" ] && sudo buildah config --label "$line" "$container"
          done <<< "${{ steps.labels.outputs.labels }}"
          sudo buildah commit --identity-label=false --rm "$container" localhost/raw-img

      - name: Extract final image digest
        id: final_digest
        run: |
          set -euo pipefail
          if [ "${{ inputs.skip_rechunk }}" = "true" ]; then
            SOURCE_REF="containers-storage:localhost/raw-img"
          else
            SOURCE_REF="containers-storage:localhost/chunked-img"
          fi
          FULL_DIGEST=$(sudo skopeo inspect --format='{{.Digest}}' "$SOURCE_REF")
          SHORT_DIGEST=$(echo "$FULL_DIGEST" | sed 's/sha256://')
          echo "source_ref=$SOURCE_REF" >> $GITHUB_OUTPUT
          echo "full_build_digest=$FULL_DIGEST" >> $GITHUB_OUTPUT
          echo "build_digest=$SHORT_DIGEST" >> $GITHUB_OUTPUT

      - name: Sign and Push to GHCR
        id: sign_and_push
        env:
          SIGNING_SECRET: ${{ secrets.signing_secret }}
        run: |
          set -euo pipefail
          SOURCE_REF="${{ steps.final_digest.outputs.source_ref }}"
          IMAGE_DIGEST="${{ steps.final_digest.outputs.full_build_digest }}"
          SHORT_DIGEST="${{ steps.final_digest.outputs.build_digest }}"
          IFS=',' read -r -a tags <<< "${{ matrix.variant_data.tags }}"
          BASE_IMG="${{ inputs.registry_lower }}/${{ inputs.repo }}${{ matrix.variant_data.suffix }}"

          push_and_sign() {
            local attempt=$1
            local max_attempts=$2
            DIGEST_REF="${BASE_IMG}@${IMAGE_DIGEST}"
            SHORT_DIGEST_INNER="${SHORT_DIGEST}"
            local attempt_tags=("${tags[@]}")

            echo "::group::Push primary image (attempt ${attempt}/${max_attempts})"
            echo "Source ref: ${SOURCE_REF}"
            echo "Digest ref: ${DIGEST_REF}"
            echo "Base image: ${BASE_IMG}"
            echo "Pushing primary image: ${DIGEST_REF}"
            sudo skopeo copy \
              --authfile /tmp/skopeo-auth/auth.json \
              "$SOURCE_REF" "docker://$DIGEST_REF"

            echo "Verifying remote digest..."
            REMOTE_DIGEST=$(sudo skopeo inspect --format='{{.Digest}}' "docker://$DIGEST_REF")
            echo "Local digest:  ${IMAGE_DIGEST}"
            echo "Remote digest: ${REMOTE_DIGEST}"
            if [ "${IMAGE_DIGEST}" != "${REMOTE_DIGEST}" ]; then
              echo "::warning::Remote digest differs from local! Using remote digest for signing."
              DIGEST_REF="${BASE_IMG}@${REMOTE_DIGEST}"
              SHORT_DIGEST_INNER=$(echo "$REMOTE_DIGEST" | sed 's/sha256://')
            fi
            echo "Final digest ref: ${DIGEST_REF}"
            echo "::endgroup::"

            echo "::group::Push tags"
            attempt_tags+=("$SHORT_DIGEST_INNER")
            echo "Tags to push: ${attempt_tags[*]}"
            for tag in "${attempt_tags[@]}"; do
              FULL_TAG="${BASE_IMG}:${tag}"
              echo "Pushing tag: ${FULL_TAG}"
              sudo skopeo copy \
                --authfile /tmp/skopeo-auth/auth.json \
                --preserve-digests \
                --all \
                "docker://$DIGEST_REF" "docker://${FULL_TAG}"
            done
            echo "::endgroup::"

            echo "::group::Sign image"
            echo "Signing image: ${DIGEST_REF}"
            cosign sign -y \
              --key env://SIGNING_SECRET \
              --registry-username "${{ github.actor }}" \
              --registry-password "${{ secrets.GITHUB_TOKEN }}" \
              "$DIGEST_REF"
            echo "::endgroup::"

            echo "::group::Verify signature"
            echo "Verifying signature with cosign.pub..."
            if cosign verify \
              --key ./cosign.pub \
              "$DIGEST_REF"; then
              echo "Signature verification successful!"
            else
              echo "::error::Signature verification failed for ${DIGEST_REF}"
              exit 1
            fi
            echo "::endgroup::"
          }

          max_attempts=3
          delay=15
          for attempt in $(seq 1 $max_attempts); do
            if push_and_sign "$attempt" "$max_attempts"; then
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::All ${max_attempts} attempts failed."
              exit 1
            fi

            echo "::warning::Attempt ${attempt} failed. Retrying in ${delay}s..."
            sleep "$delay"
          done
