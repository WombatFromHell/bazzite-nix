on:
  workflow_call:
    inputs:
      variants_to_build:
        description: "JSON array of variant data to build"
        required: true
        type: string
      date:
        description: "ISO 8601 timestamp"
        required: true
        type: string
      registry_lower:
        description: "Registry URL (standardized output from build.yml)"
        required: true
        type: string
      repo:
        description: "Repository name (standardized output from build.yml)"
        required: true
        type: string
      image_desc:
        description: "Image description for OCI labels"
        required: true
        type: string
      skip_rechunk:
        description: "Skip rechunk step (faster build, larger layers)"
        required: false
        default: false
        type: boolean
    secrets:
      signing_secret:
        description: "Cosign signing secret"
        required: true

jobs:
  build_push:
    name: Build & Push ${{ matrix.variant_data.variant }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant_data: ${{ fromJson(inputs.variants_to_build) }}

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      # Centralise the base image ref so all steps reference it identically
      BASE_IMG: >-
        ${{ inputs.registry_lower }}/${{ inputs.repo }}${{ matrix.variant_data.suffix }}
      MAX_ATTEMPTS: 3
      RETRY_DELAY: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        # Extracted into its own named step for clarity; retry logic kept
        run: |
          set -euo pipefail
          mkdir -p /tmp/skopeo-auth
          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if echo "${{ secrets.GITHUB_TOKEN }}" | \
               skopeo login ghcr.io \
                 -u "${{ github.actor }}" \
                 --password-stdin \
                 --authfile /tmp/skopeo-auth/auth.json; then
              exit 0
            fi
            [ "$attempt" -ge "$MAX_ATTEMPTS" ] && \
              { echo "::error::All ${MAX_ATTEMPTS} login attempts failed."; exit 1; }
            echo "::warning::Login attempt ${attempt} failed. Retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done

      - name: Build image
        uses: ./.github/actions/build-reusable
        id: build
        with:
          base_image: ${{ matrix.variant_data.base_image }}
          build_script: ${{ matrix.variant_data.build_script || 'build.sh' }}
          canonical_tag: ${{ matrix.variant_data.canonical_tag }}
          variant: ${{ matrix.variant_data.variant }}
          parent_version: ${{ matrix.variant_data.parent_version }}
          date: ${{ inputs.date }}
          image_desc: ${{ inputs.image_desc }}
          repository_owner: ${{ github.repository_owner }}
          repository_name: ${{ github.event.repository.name }}
          skip_rechunk: ${{ inputs.skip_rechunk }}

      - name: Push to GHCR
        id: push_image
        run: |
          set -euo pipefail
          SOURCE_REF="${{ steps.build.outputs.source_ref }}"
          IFS=',' read -r -a TAGS <<< "${{ matrix.variant_data.tags }}"

          REMOTE_DIGEST=""
          REMOTE_DIGEST_REF=""

          push_image() {
            local attempt="$1"
            echo "::group::Push primary image (attempt ${attempt}/${MAX_ATTEMPTS})"
            echo "Source ref : ${SOURCE_REF}"
            echo "Base image : ${BASE_IMG}"
            echo "First tag  : ${TAGS[0]}"

            # Push the primary image digest
            local -a compress_flags=()
            if [[ "${{ inputs.skip_rechunk }}" == "true" ]]; then
              compress_flags=(
                --dest-compress-format=zstd
                --dest-compress-level=6
              )
            else
              compress_flags=()
            fi
            #
            sudo skopeo copy \
              --authfile /tmp/skopeo-auth/auth.json \
              "${compress_flags[@]}" \
              "${SOURCE_REF}" "docker://${BASE_IMG}:${TAGS[0]}"

            local remote_digest
            remote_digest=$(sudo skopeo inspect \
              --format='{{.Digest}}' \
              "docker://${BASE_IMG}:${TAGS[0]}")

            local short_digest="${remote_digest#sha256:}"
            local digest_ref="${BASE_IMG}@${remote_digest}"
            echo "Remote digest : ${remote_digest}"
            echo "Digest ref    : ${digest_ref}"
            echo "::endgroup::"

            echo "::group::Push additional tags (including short digest)"
            # Append the short digest as an extra tag so every image is
            # pinnable by content even without a dedicated tag for it.
            local extra_tags=("${TAGS[@]:1}" "$short_digest")
            for tag in "${extra_tags[@]}"; do
              echo "  → ${BASE_IMG}:${tag}"
              sudo skopeo copy \
                --authfile /tmp/skopeo-auth/auth.json \
                --preserve-digests \
                "docker://${digest_ref}" "docker://${BASE_IMG}:${tag}"
            done
            echo "::endgroup::"

            # Write to outer-scope variables — these survive the function call
            REMOTE_DIGEST="$remote_digest"
            REMOTE_DIGEST_REF="$digest_ref"
          }

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            if push_image "$attempt"; then break; fi
            [ "$attempt" -ge "$MAX_ATTEMPTS" ] && \
              { echo "::error::All ${MAX_ATTEMPTS} push attempts failed."; exit 1; }
            echo "::warning::Push attempt ${attempt} failed. Retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done

          [[ -z "$REMOTE_DIGEST" ]] && \
            { echo "::error::REMOTE_DIGEST is empty after push loop."; exit 1; }

          echo "remote_digest=${REMOTE_DIGEST}"         >> "$GITHUB_OUTPUT"
          echo "remote_digest_ref=${REMOTE_DIGEST_REF}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign and verify image
        id: sign_and_verify
        env:
          SIGNING_SECRET: ${{ secrets.signing_secret }}
        run: |
          set -euo pipefail
          DIGEST_REF="${{ steps.push_image.outputs.remote_digest_ref }}"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "::group::Sign image (attempt ${attempt}/${MAX_ATTEMPTS})"
            if cosign sign -y \
              --key env://SIGNING_SECRET \
              --new-bundle-format=false \
              --use-signing-config=false \
              --registry-referrers-mode=legacy \
              --registry-username "${{ github.actor }}" \
              --registry-password "${{ secrets.GITHUB_TOKEN }}" \
              "${DIGEST_REF}"; then
              echo "::endgroup::"
              break
            fi
            echo "::endgroup::"
            [ "$attempt" -ge "$MAX_ATTEMPTS" ] && \
              { echo "::error::Signing failed after ${MAX_ATTEMPTS} attempts."; exit 1; }
            sleep "$RETRY_DELAY"
          done

          echo "::group::Verify image"
          cosign verify \
            --key ./cosign.pub \
            "${DIGEST_REF}"
          echo "::endgroup::"

          echo "::group::Inspect layer sizes"
          TOTAL_MB=$(sudo skopeo inspect --raw \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://${DIGEST_REF}" | \
            jq '([.layers[].size] | add) / 1024 / 1024 | round')
          echo "Total compressed size: ${TOTAL_MB} MB"
          echo "::endgroup::"

          REMOTE_DIGEST="${{ steps.push_image.outputs.remote_digest }}"
          TAGS_FMT=$(echo "${{ matrix.variant_data.tags }}" | tr ',' ' · ')

          RECHUNKED="$([[ "${{ inputs.skip_rechunk }}" == "false" ]] && echo "yes" || echo "no")"
          {
            echo "## ${{ matrix.variant_data.variant }}"
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| **Image**          | \`${BASE_IMG}\` |"
            echo "| **Digest**         | \`${REMOTE_DIGEST}\` |"
            echo "| **Tags**           | \`${TAGS_FMT}\` |"
            echo "| **Parent version** | \`${{ matrix.variant_data.parent_version }}\` |"
            echo "| **Built**          | \`${{ inputs.date }}\` |"
            echo "| **Image size**     | \`${TOTAL_MB} MB\` |"
            echo "| **Rechunked**      | \`${RECHUNKED}\` |"
            echo "| **Signed & verified** | ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"
