name: Resign Image

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Variant to resign (leave empty to resign all enabled latest variants)"
        required: false
        type: string
        default: ""
      tag:
        description: "Specific tag to resign (optional, uses base tag from variants.json if empty)"
        required: false
        type: string
        default: ""

jobs:
  prepare:
    name: Prepare variant list
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      variants: ${{ steps.prepare.outputs.variants }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare variant list
        id: prepare
        env:
          SELECTED_VARIANTS: ${{ inputs.variant }}
          SELECTED_TAGS: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="${REPO_OWNER_LOWER}/bazzite-nix"

          # Build a jq-compatible JSON array from comma-separated inputs (empty = match all)
          to_json_array() {
            local input="$1"
            if [ -z "$input" ]; then
              echo "[]"
            else
              echo "$input" | tr ',' '\n' | jq -Rsc 'split("\n") | map(select(length > 0))'
            fi
          }

          VARIANT_FILTER=$(to_json_array "$SELECTED_VARIANTS")
          TAG_FILTER=$(to_json_array "$SELECTED_TAGS")

          OUTPUT=$(jq -c \
            --argjson variant_filter "$VARIANT_FILTER" \
            --argjson tag_filter     "$TAG_FILTER" \
            --arg     repo           "$REPO" \
            '[ .variants[]
              | select((.disabled // false) != true)
              | select(
                  ($variant_filter | length) == 0
                  or (.name as $n | $variant_filter | any(. == $n))
                )
              | . as $v
              | if ($tag_filter | length) == 0 then
                  [ ($v.base_image | split(":") | last) ]
                else
                  $tag_filter
                end
              | .[]
              | {
                  variant:      $v.name,
                  suffix:       ($v.suffix // ""),
                  target_image: ("ghcr.io/" + $repo + ($v.suffix // "")),
                  base_tag:     .
                }
            ]' .github/variants.json)

          if [ "$(echo "$OUTPUT" | jq 'length')" -eq 0 ]; then
            echo "::error::No variants found to resign"
            exit 1
          fi

          count=$(echo "$OUTPUT" | jq 'length')
          echo "Found ${count} variant(s)/tag(s) to resign:"
          echo "$OUTPUT" | jq -r '.[] | "  - \(.variant) @ \(.base_tag)"'

          echo "variants=${OUTPUT}" >> "$GITHUB_OUTPUT"

  resign:
    name: Resign ${{ matrix.variant_data.variant }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        variant_data: ${{ fromJson(needs.prepare.outputs.variants) }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Install crane
        uses: imjasonh/setup-crane@v0.5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve digest
        id: resolve
        env:
          TARGET_IMAGE: ${{ matrix.variant_data.target_image }}
          BASE_TAG: ${{ matrix.variant_data.base_tag }}
          SELECTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          lookup_tag="${SELECTED_TAG:-$BASE_TAG}"
          digest=$(crane digest "${TARGET_IMAGE}:${lookup_tag}" 2>/dev/null || true)

          if [ -z "$digest" ]; then
            echo "::error::Could not find remote image at ${TARGET_IMAGE}:${lookup_tag}"
            exit 1
          fi

          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "lookup_tag=${lookup_tag}" >> "$GITHUB_OUTPUT"

      - name: Sign and verify image
        env:
          SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
          BASE_IMG: ${{ matrix.variant_data.target_image }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
          BASE_TAG: ${{ steps.resolve.outputs.lookup_tag }}
          VARIANT: ${{ matrix.variant_data.variant }}
        run: |
          set -euo pipefail
          DIGEST_REF="${BASE_IMG}@${DIGEST}"
          SHORT_DIGEST="${DIGEST#sha256:}"

          if cosign verify --key ./cosign.pub "${DIGEST_REF}" >/dev/null 2>&1; then
            echo "::notice::Image already signed, skipping re-sign"
            ALREADY_SIGNED=true
          else
            echo "::notice::No existing signature found — signing"
            cosign sign -y \
              --key env://SIGNING_SECRET \
              --new-bundle-format=false \
              --use-signing-config=false \
              --registry-referrers-mode=legacy \
              "${DIGEST_REF}"
            ALREADY_SIGNED=false
          fi

          echo "::group::Verify signature"
          cosign verify --key ./cosign.pub "${DIGEST_REF}"
          echo "::endgroup::"

          STATUS="✅ Signed & verified"
          [ "$ALREADY_SIGNED" = "true" ] && STATUS="✅ Already signed (verified)"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ${VARIANT}

          | Field | Value |
          | ----- | ----- |
          | **Image** | \`${BASE_IMG}\` |
          | **Digest** | \`${SHORT_DIGEST}\` |
          | **Base tag** | \`${BASE_TAG}\` |
          | **Status** | ${STATUS} |
          EOF
