label: "bazzite-nix-Live"
grub2:
  timeout: 3
  entries:
    - name: "Launch bazzite-nix Installer"
      linux: "/images/pxeboot/vmlinuz quiet rhgb root=live:CDLABEL=bazzite-nix-Live enforcing=0 rd.live.image"
      initrd: "/images/pxeboot/initrd.img"
    - name: "Launch bazzite-nix Installer (Basic Graphics Mode)"
      linux: "/images/pxeboot/vmlinuz quiet rhgb root=live:CDLABEL=bazzite-nix-Live enforcing=0 rd.live.image nomodeset"
      initrd: "/images/pxeboot/initrd.img"
