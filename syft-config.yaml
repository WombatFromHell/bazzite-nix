default-catalogers:
  - rpm

relationships:
  package-file-ownership: false
  package-file-ownership-overlap: true

file:
  metadata:
    selection: "none"
  content:
    globs: []
  executable:
    globs: []

# 4. Your existing search exclusions
search:
  scope: squashed
  exclude:
    paths:
      - /sysroot/ostree/repo
      - /sysroot/ostree/deploy
      - /usr/share/doc
      - /usr/share/man
      - /usr/share/locale
      - /var/cache
      - /ostree
      - /tmp

scope: "squashed"
parallelism: 0

license:
  content: "none"
